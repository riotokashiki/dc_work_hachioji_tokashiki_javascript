<!DOCTYPE html>
<html>
<head>
  <title>Weather Dashboard</title>
  <style>
   body { 
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
  max-width: 500px; margin: 50px auto; 
  background: linear-gradient(135deg, #667eea 50%, #764ba2 100%);
  min-height: 100vh; padding: 20px;
}
#weather-card { 
  background: rgba(255,255,255,0.95); 
  backdrop-filter: blur(10px);
  border-radius: 24px; 
  padding: 40px 30px; 
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  text-align: center;
}
input { 
  padding: 18px 20px; width: 65%; 
  border: 2px solid #e1e5e9; 
  border-radius: 16px; 
  font-size: 16px; 
  transition: border 0.3s;
}
input:focus { border-color: #667eea; outline: none; }
button { 
  padding: 18px 24px; 
  background: linear-gradient(45deg, #16a085, #f4d03f);
  color: white; 
  border: none; 
  border-radius: 16px; 
  cursor: pointer; 
  font-weight: 600;
  margin-left: 10px;
}
#temp { 
  font-size: 64px; 
  font-weight: 800; 
  background: linear-gradient(45deg, #667eea, #764ba2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin: 20px 0;
}
#loading { 
  color: #667eea; 
  font-weight: 500;
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  </style>
</head>
<body>
  <div id="weather-card">
    <h1>🌤️ Tokyo Weather</h1>
    <form id="search-form">
      <input type="text" id="city-input" placeholder="Enter city (e.g. Tokyo)" value="Tokyo">
      <button type="submit">Search</button>
    </form><button id="clear-btn" style="background:#ff7675;">Clear History</button>

    <div id="loading">Loading...</div>
    <div id="error" style="color: red;"></div>
    <div id="temp">--°C</div>
    <div id="weather-icon" style="font-size: 64px; margin: 20px 0;">🌤️</div>
    

    <div id="details">Humidity: --% | Wind: --km/h</div>
    <h3 style="margin: 20px 0 10px 0; color: #333;">Recent Searches</h3>
<div id="recent-list"></div>

  </div>

  <script>
    // YOUR EXACT LESSON 21 AJAX PATTERN
    async function getWeather(city) {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('error').style.display = 'none';
      
      try {
        // Step 1: Get city coordinates (Nominatim - no key needed)
        const coordsRes = await fetch(`https://nominatim.openstreetmap.org/search?q=${city}&format=json&limit=1`);
        const coords = await coordsRes.json();
        
        if (!coords[0]) throw new Error('City not found');
        
        const { lat, lon } = coords[0];
        
        // Step 2: Get Tokyo/Japan weather (Open-Meteo - no key)
        const weatherRes = await fetch(
  `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode&temperature_unit=celsius&windspeed_unit=kmh&timezone=Asia%2FTokyo`
);

        const weather = await weatherRes.json();
        
        // Step 3: Update DOM (lesson 13)
        document.getElementById('temp').textContent = weather.current_weather.temperature + '°C';
        // Save to recent searches (your new code!)
          let recent = JSON.parse(localStorage.getItem('recentCities') || '[]');
          if (!recent.includes(city)) {
            recent.unshift(city);  // Add to front
            if (recent.length > 5) recent.pop();  // Keep only 5
            localStorage.setItem('recentCities', JSON.stringify(recent));
          }
          showRecent();  // Update list
          // Weather icon from code (0=clear, 1=cloudy, 3=rain, etc.)
            const weatherCode = weather.daily.weathercode[0];
            const iconMap = {
              0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 51: '🌦️', 61: '🌧️', 71: '❄️', 95: '⛈️'
            };
            document.getElementById('weather-icon').textContent = iconMap[weatherCode] || '🌤️';


        document.getElementById('details').textContent = 
          `Humidity: ${weather.current?.relative_humidity_2m?.toFixed(0) || '--'}% | Wind: ${weather.current_weather.windspeed.toFixed(0)}km/h`;
        
      } catch (error) {
        document.getElementById('error').textContent = error.message;
        document.getElementById('error').style.display = 'block';
      }
      
      document.getElementById('loading').style.display = 'none';
    }
    
    // Event listener (lesson 15)
    document.getElementById('search-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const city = document.getElementById('city-input').value;
      getWeather(city);
    });
    
    // Load Tokyo weather on start
          document.getElementById('clear-btn').addEventListener('click', () => {
        localStorage.removeItem('recentCities');
        showRecent();
      });

    getWeather('Tokyo');
    function showRecent() {
      const recent = JSON.parse(localStorage.getItem('recentCities') || '[]');
      const list = document.getElementById('recent-list');
      list.innerHTML = recent.map(city => 
        `<button onclick="getWeather('${city}')" style="margin: 5px; padding: 8px 12px; background: #e17055; color: white; border: none; border-radius: 8px; cursor: pointer;">${city}</button>`
      ).join('');
    }
    showRecent();  // Load on start

  </script>
</body>
</html>
