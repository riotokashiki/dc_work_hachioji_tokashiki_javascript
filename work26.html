<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Work26 stop watch</title>
    <style>
      body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
      }
      .container{
        background-color:green;
        height :300px;
        width:200px;
        border-radius:16px;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        
      }
      .displayScreen{
        height:50%;
        width:80%;
        background-color:blue;
        border-radius:16px;
         display:flex;
        justify-content:center;
        align-items:center;
        

      }

      .numbers{
        color:white;
      }
      input{
        border-radius:7px;
      }
      

    </style>
</head>
<body>
    <div class="container">
      <div class="displayScreen">
        <p class="numbers" id="numbers">
          <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>

        </p>

      </div>
      <div class="buttonContainer">
        <input type="button" id="start" value="Start">
        <input type="button" id="stop" value="Stop" disabled>
        <input type="button" id="reset" value="Reset" disabled>


      </div>

    </div>
    







    <script>
        function startStopWatch(){
           let secondValue=document.getElementById("seconds")  //уДњжЄЮУдЂу┤асЂ«тЈќтЙЌ
           let minuteValue=document.getElementById("minutes")   //тѕєжЄЮУдЂу┤асЂ«тЈќтЙЌ
           let hourValue=document.getElementById("hours")       //ТЎѓжЄЮУдЂу┤асЂ«тЈќтЙЌ
           let secondCount=0  //уДњжЄЮ
           let minuteCount=0  //тѕєжЄЮ
           let hourCount=0     //ТЎѓжЄЮ

           document.getElementById("start").disabled=true;
           document.getElementById("stop").disabled=false;
           document.getElementById("reset").disabled=true;


          function countUp(){

            if(secondCount<=8){    
              secondCount=secondCount+1;
              secondValue.textContent= "0"+secondCount; //secondCount 1ТАЂТЎѓсЂ« zero padding
            }

            else if(secondCount>=9 &&secondCount<=58){
            
            secondCount=secondCount+1;
            secondValue.textContent= secondCount;
            }

           
            
            else if (secondCount>=59){    //secondCountсЂїСИђтѕєсЂФтѕ░жЂћсЂЎсѓІТЎѓ
              secondCount=0;         //secondCountсѓњ0сЂФсѓѓсЂЕсЂЎ
              secondValue.textContent= "0"+secondCount; //сЂЮсЂЌсЂд0сЂФ0сѓњсЂцсЂЉУХ│сЂЌсЂд00сЂеУАеУеўсЂЋсЂЏсѓІ
              minuteCount=minuteCount+1; // minuteCountсЂФ1сЃЌсЃЕсѓ╣сЂЎсѓІ
              minuteValue.textContent=minuteCount;

              if(minuteCount<10 && minuteCount>0){ //  #NESTED If
              minuteValue.textContent="0"+minuteCount;
            }

            else if(minuteCount>59){  //minuteCountсЂї1ТЎѓжќЊсЂФсЂфсѓІсЂесЂЇ  // #NESTED else if
              minuteCount=0;          //minuteCountсѓњ0сЂФсѓѓсЂЕсЂЎ
              minuteValue.textContent="0"+minuteCount;//сЂЮсЂЌсЂдminuteCountсЂ«0сЂФ0сѓњсЂцсЂЉУХ│сЂЌсЂд00сЂеУАеУеўсЂЋсЂЏсѓІ
              hourCount=hourCount+1; //hourCountсЂФ1сЃЌсЃЕсѓ╣
              hourValue.textContent=hourCount;
              if(hourCount<10 && hourCount>0){  //  hourCountсЂ«zero padding  #NESTED NESTED if
              hourValue.textContent="0"+hourCount
            } 
          }

            }

            
          }

           setInterval(countUp,1000)
           
      

        };


        function stopStopWatch(){
          clearInterval(intervalID);



        }






       
        let startButton=document.getElementById("start") //Start buttonУдЂу┤асѓњтЈќтЙЌ
        startButton.addEventListener("click",startStopWatch) //сѓ»сЃфсЃЃсѓ»ТЎѓсЂФ жќбТЋ░ startStopWatchсѓњт«ЪУАї

        let intervalID =setInterval(countUp,1000) // setIntervalсЂ«У┐ћсѓітђцсѓњintervalIDсЂесЂЌсЂдС┐ЮтГў

        let stopButton=document.getElementById("stop") 
        stopButton.addEventListener("click",stopStopWatch) 




    </script>
</body>
</html>
