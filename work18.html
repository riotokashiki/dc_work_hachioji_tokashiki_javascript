<!DOCTYPE html>

<body>
    <script> 
      
      let theRadius=4;

      const areaOfCircle=function(radius){return (radius*radius)*Math.PI;
      }

      document.write(Math.floor(areaOfCircle(theRadius)));

      document.write("<br>");

      document.write(theRadius*2);



    </script> 
</body>
