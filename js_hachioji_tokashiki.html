<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Piano App</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Potta+One&display=swap');
      
      body{
        font-family:"Potta One",sans-serif;
        display:flex;
        justify-content: center;
        height: 1000px;
        /*background: #635f5f;*/
        background-color:#e46f00;
        transition: all 1.5s ease-out;
      }
      body.lowerOctave{

        background-color: #0c0075;
        /*transition: all 2s ease-out;*/
      }

      body.higherOctave{
        background-color: #bee900;
      }
      .container{
        width:800px;
        height:700px;
        background-color:rgb(255, 0, 157);
        display:flex;
        flex-direction:column;
        vertical-align:center;
        justify-content:space-around;
        border-radius:10px 10px 200px 200px;
        border-bottom:20px solid rgb(188 0 116);
        background-image: linear-gradient(to bottom, #fc77c0,rgb(255, 0, 157));
      }
      .display{
        background-color:rgb(0, 158, 250);
        width:60%;
        height:100%;
        margin:0 auto;
        display:flex;
        justify-content: center;
        align-items: center;
        border-radius:20px;
        position:relative;
        border-top:5px solid rgb(143, 0, 100);
         background-image: linear-gradient(to bottom, #76adff, #0004ff);
      }
      .keys{
        /*background-color:pink;*/
        width:80%;
        height:40%;
        margin:0 auto;
        display:flex;
        background-color: #6b0042;
        border-radius: 5px 5px 30px 30px;
      }

      .key{
         border:1px solid black;
         width:15%;
         height:99%;
         border-radius:10px 10px 40px 40px;
         background-color:white;
         transition: all 0.1s ease-out;
         border-bottom: 10px solid #bfb8b8;
      }

      .key.glowing{
        transform: translateY(10px);
        background-color:rgb(255, 136, 0);
        transition: all 0.1s ease-out;
         border-bottom: 10px solid rgb(187, 100, 0);
         border-top: 5px solid rgb(187, 100, 0);
      }

      .letter{
        color:white;
        font-size:50px;
        font-weight:bold;
      }
      .letterInUpperDisplay{
        display:none;
        color:white;
        position:absolute;
        top:10px;
      }


      .displayContainer{
        width:100%;
        height:30%;
        display:flex;
        justify-content: center;
        position:relative;
        
      }

      .autoPlay{
        position:absolute;
        bottom:0px;
        right:0px;
        transition: all 0.1s ease-out;
        font-family:"Potta One",sans-serif;
      }
      button.autoPlayButton{
      border-bottom:6px solid rgb(172 172 172);
      transition: all 0.1s ease-out;
      font-family:"Potta One",sans-serif;
      }

      button.autoPlayButton:active{
      border-bottom:0px;
      transform: translateY(6px);

      }

      .sliderContainer{
        position:absolute;
        left:10px;
        bottom:0px;
        display:flex;
        flex-direction:column;
        justify-content: center;
        align-items: center;
      }

      input#volumeSlider {
      width: 80%;
      }
      
      div.volume{
        font-size:16px;
        font-weight:100;
      }

      .muteButton{
        width:20px;
        height:20px;

      }

      .octaveShifterContainer{
        position:absolute;
        top:0px;
        left:30px;
        display:flex;
align-items:center;
      
      }

      .octaveButtonContainer{
        display:flex;
        flex-direction:column;
        
      }
      p.octave{
        font-size:17px;
        align-items:center;
      }
      .octaveButton{
        transition: all 0.1s ease-out;
      }

      .octaveButton:active{
        filter:contrast(0);
        transition: all 0.1s ease-out;
      }

      .octaveButton:hover,
      .muteButton:hover,
      .key:hover,
      .autoPlayButton:hover,
      input#volumeSlider:hover
      {
        cursor: pointer;
      }



    </style>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>
<body>
<div class="container">
  <div class="displayContainer">
      <div class="display">
        <div class="letter">
      
      </div>
      <div class="letterInUpperDisplay">Playing:</div>
      </div>
          <div class="autoPlay">
            <button class="autoPlayButton" onclick="autoPlay(null,0)">
              AutoPlay
            </button>
          </div>
          <div class="sliderContainer">
            <div class="volume"><span><img src="materials/images/icons8-volume-60.png" alt="" class="muteButton" onclick="muteVolume()">  </span>Volume</div>
            <input type="range" min="0" max="100" value="100" class="slider" id="volumeSlider">
              
          </div>
          <div class="octaveShifterContainer">
            <p class="octave">Octave</p>
            <div class="octaveButtonContainer">
            <img class="octaveButton up" onclick="octaveUp()" src="materials/images/icons8-up-arrow-40.png" alt="up"></img>
            <img class="octaveButton down" onclick="octaveDown()" src="materials/images/icons8-down-button-40.png" alt="down"></img>
            </div>
          </div>

  </div>
  
  <div class="keys">
    <div class="key do" onclick="display('ド');playSound('ド')"></div>
    <div class="key re" onclick="display('レ');playSound('レ')"></div>
    <div class="key mi"onclick="display('ミ');playSound('ミ')"></div>
    <div class="key fa" onclick="display('ファ');playSound('ファ')"></div>
    <div class="key so" onclick="display('ソ');playSound('ソ')"></div>
    <div class="key ra" onclick="display('ラ');playSound('ラ')"></div>
    <div class="key shi"onclick="display('シ');playSound('シ')"></div>


  </div>

</div>





<script>
/////////////////global variables /////////////////////////////////////////////////////////////////////////

let isPlaying=false
let currentNoteIndex=0
let currentSongName=null
let lengthOfCurrentSong=0
let playInterval=null
let isPaused=false
let displayInterval=null
let volume=50
let slider=$('#volumeSlider')    ;      //capturing volume slider and storing it into a variable "slider"
let previousVolume=100 
let octaveMultiplied=1
let currentOctave=4

const notes={ //creating an object
  "ド":261.63,  // those numbers are frequencies that'll be given to the functions
  "レ":293.66,
  "ミ":329.63,
  "ファ":349.23,
  "ソ":392.00,
  "ラ":440.00,
  "シ":493.88,
  "":0
}


const scoreData={
"きらきらぼし":[
                                {note:"ド",duration:500},{note:"",duration:500},
                                {note:"ド",duration:500},{note:"",duration:500},
                                {note:"ソ",duration:500},{note:"",duration:500},
                                {note:"ソ",duration:500},{note:"",duration:500},
                                {note:"ラ",duration:500},{note:"",duration:500},
                                {note:"ラ",duration:500},{note:"",duration:500},
                                {note:"ソ",duration:2000},

                                {note:"ファ",duration:500},{note:"",duration:500},
                                {note:"ファ",duration:500},{note:"",duration:500},
                                {note:"ミ",duration:500},{note:"",duration:500},
                                {note:"ミ",duration:500},{note:"",duration:500},
                                {note:"レ",duration:500},{note:"",duration:500},
                                {note:"レ",duration:500},{note:"",duration:500},
                                {note:"ド",duration:2000},

                                {note:"ソ",duration:500},{note:"",duration:500},
                                {note:"ソ",duration:500},{note:"",duration:500},
                                {note:"ファ",duration:500},{note:"",duration:500},
                                {note:"ファ",duration:500},{note:"",duration:500},
                                {note:"ミ",duration:500},{note:"",duration:500},
                                {note:"ミ",duration:500},{note:"",duration:500},
                                {note:"レ",duration:2000},

                                {note:"ソ",duration:500},{note:"",duration:500},
                                {note:"ソ",duration:500},{note:"",duration:500},
                                {note:"ファ",duration:500},{note:"",duration:500},
                                {note:"ファ",duration:500},{note:"",duration:500},
                                {note:"ミ",duration:500},{note:"",duration:500},
                                {note:"ミ",duration:500},{note:"",duration:500},
                                {note:"レ",duration:2000},

                                {note:"ド",duration:500},{note:"",duration:500},
                                {note:"ド",duration:500},{note:"",duration:500},
                                {note:"ソ",duration:500},{note:"",duration:500},
                                {note:"ソ",duration:500},{note:"",duration:500},
                                {note:"ラ",duration:500},{note:"",duration:500},
                                {note:"ラ",duration:500},{note:"",duration:500},
                                {note:"ソ",duration:2000},

                                {note:"ファ",duration:500},{note:"",duration:500},
                                {note:"ファ",duration:500},{note:"",duration:500},
                                {note:"ミ",duration:500},{note:"",duration:500},
                                {note:"ミ",duration:500},{note:"",duration:500},
                                {note:"レ",duration:500},{note:"",duration:500},
                                {note:"レ",duration:500},{note:"",duration:500},
                                {note:"ド",duration:2000}
                                ]
                                ,
"チューリップ":[
                              {note:"ド",duration:500},{note:"レ",duration:500},{note:"ミ",duration:1000},
                              {note:"ド",duration:500},{note:"レ",duration:500},{note:"ミ",duration:1000},
                              {note:"ソ",duration:500},{note:"ミ",duration:500},{note:"レ",duration:500},{note:"ド",duration:500},
                              {note:"レ",duration:500},{note:"ミ",duration:500},{note:"レ",duration:1000},       
                              
                              {note:"ド",duration:500},{note:"レ",duration:500},{note:"ミ",duration:1000},
                              {note:"ド",duration:500},{note:"レ",duration:500},{note:"ミ",duration:1000},
                              {note:"ソ",duration:500},{note:"ミ",duration:500},{note:"レ",duration:500},{note:"ド",duration:500},
                              {note:"レ",duration:500},{note:"ミ",duration:500},{note:"ド",duration:1000},  

                              {note:"ソ",duration:250},{note:"ソ",duration:250},{note:"ミ",duration:250},{note:"ソ",duration:250},
                              {note:"ラ",duration:250},{note:"ラ",duration:250},{note:"ソ",duration:1000},

                              {note:"ミ",duration:250},{note:"ミ",duration:250},
                              {note:"レ",duration:250},{note:"レ",duration:250},
                              {note:"ド",duration:4000},
                              ]
                            }








///////////////////////////////////////////////////////////////////////////////////////////////////////////

///////////////////functions///////////////////////////////////////////////////////////////////////////////

function display(note)
{ 
   clearTimeout(displayInterval);

$('.letter').text(note);            // displaying note 


  displayInterval=setTimeout(function(){ // making it disappear in 1 sec
    $('.letter').text("");
  },500)

  //// for key glowing function////////////////////////////////////
  const noteToClassNameConverter= //音階 （"ド"）をクラス名へ変換するためのオブジェクト
  {
    "ド":".do",
    "レ":".re",
    "ミ":".mi",
    "ファ":".fa",
    "ソ":".so",
    "ラ":".ra",
    "シ":".shi"
  }

  $(noteToClassNameConverter[note]).addClass("glowing");
console.log("class selected is "+noteToClassNameConverter[note]);
console.log($(noteToClassNameConverter[note]).attr('class'));

setTimeout(function(){
$(noteToClassNameConverter[note]).removeClass("glowing");

},500);
//console.log("after setTimeout "+$(noteToClassNameConverter[note]).attr('class'));




} //closing display function


function autoPlayPaused(currentSongName)
{

            isPaused=true 
            console.trace("autoPlayPaused was called from:");
             clearTimeout(playInterval);
             console.log("the song has been paused!!")
              $('.key').prop('disabled',false);
              isPlaying=false;
                $('.autoPlayButton').text('AutoPlay');
          $('.autoPlayButton').attr('onclick',`autoPlay('${currentSongName}',0)`);
            console.log('<button>attribute changed to,'+'${currentSongName}');
           $('.letterInUpperDisplay').css('display','none');
           console.log("currentSongName is..."+currentSongName);



}







 function stopAutoPlay()
 {
              console.trace("stopAutoPlay was called from:");
              console.log("stopAutoPlay called, playInterval =", playInterval);
              clearTimeout(playInterval);
              console.log("the song has reached the end!!")
              $('.key').prop('disabled',false);
              isPlaying=false;

            $('.autoPlayButton').text('AutoPlay');
          $('.autoPlayButton').attr('onclick','autoPlay(null,0)');

           $('.letterInUpperDisplay').css('display','none');
              
              console.log("currentSongName is..."+currentSongName);
              return;
  } //closing stopAutoPlay function


function muteVolume(){

if(slider.val()==0){
  isMuted=true
}
else{
  isMuted=false
  previousVolume=$('#volumeSlider').val()
  console.log("previousVolume was..."+$('#volumeSlider').val());
}
console.log("isMuted...."+isMuted);

if(isMuted==false){
const audioContext=new AudioContext();//set up a foundation creating audio context
const gainNode=audioContext.createGain();   //creating Gain Node for volume control
$('#volumeSlider').val(0);
volume=0;

gainNode.gain.value=0
console.log("Current Volume is "+volume);
isMuted=true
console.log("isMuted...."+isMuted);
$('.muteButton').attr("src","materials/images/icons8-volume-60 - Copy.png");
}
else{ // isMuted is true
  $('#volumeSlider').val(previousVolume);
  console.log("restored to the previousVolume "+previousVolume);
  $('.muteButton').attr("src","materials/images/icons8-volume-60.png");
}

}

function octaveUp()
{

      if(currentOctave<6)
      {
                octaveMultiplied=octaveMultiplied*2
                currentOctave=currentOctave+1
                //$('.octaveButton').addClass('octaveButtonPressed');
                console.log("currentOctave is "+currentOctave);

                if(currentOctave>4){
                  $('body').removeClass('lowerOctave');
                  $('body').addClass('higherOctave');
                }
                if(currentOctave==4){
                $('body').removeClass('lowerOctave');
                $('body').removeClass('higherOctave');
                }
      }
      
}
function octaveDown()
{
        if(currentOctave>2)
        {
          octaveMultiplied=octaveMultiplied*0.5
          currentOctave=currentOctave-1
          //$('.octaveButton').addClass('octaveButtonPressed');
          console.log("currentOctave is "+currentOctave);

          if(currentOctave<4){
            $('body').removeClass('higherOctave');
            $('body').addClass('lowerOctave');
            
          }
          if(currentOctave==4){
          $('body').removeClass('lowerOctave');
          $('body').removeClass('higherOctave');
          }
        }
        
}







function playSound(note)
{
  
  const audioContext=new AudioContext();//set up a foundation creating audio context
  const gainNode=audioContext.createGain();   //creating Gain Node for volume control
 
  const oscillator=audioContext.createOscillator(); // creating an oscillator
  oscillator.connect(gainNode);
  oscillator.frequency.value=notes[note]*octaveMultiplied;// オブジェクト notes からfrequencyを引き出し、それをoscillatorのfrequencyとして代入


  gainNode.connect(audioContext.destination);//connecting to speakers

volume=slider.val();
gainNode.gain.value=volume/100;  // setting volume
console.log("Current Volume is "+volume);



  oscillator.start();

  oscillator.stop(audioContext.currentTime+0.5)

  
} // closing PlaySound function



function autoPlay(currentSongName,currentNoteIndex)
{

  if(isPlaying==false)
  { //非再生時のみ実行
                                                     //select between two songs randomly
            isPlaying=true;  //再生状態にする
            
            console.log('starting play');

            if(currentSongName===null)
                  {
                      const mora=Object.keys(scoreData)                                                                       //random selection function
                      const randomSong=mora[Math.floor(Math.random() * mora.length)]
                      currentSongName=randomSong
                    
                  }
            console.log("Playing"+currentSongName);
            console.log("currentSongName is.."+currentSongName);
            $('.letterInUpperDisplay').text("Playing:"+currentSongName);
            $('.letterInUpperDisplay').css('display','block');
            lengthOfCurrentSong=scoreData[currentSongName].length
            console.log("lengthOfCurrentSong="+lengthOfCurrentSong);

          $('.key').prop('disabled',true);  // disabling keys

          $('.autoPlayButton').text('Stop Playing');
          $('.autoPlayButton').attr('onclick',`autoPlayPaused('${currentSongName}')`)


            console.log("currentNoteIndex"+currentNoteIndex+",lengthOfCurrentSong"+lengthOfCurrentSong);
            if(currentNoteIndex<lengthOfCurrentSong)
            {
            
              


                songPlay= function (currentSongName,currentNoteIndex)
                {  //関数を設定
                      const audioContext=new AudioContext();//set up a foundation
                      
  











                      
                      playNextNote=function(currentSongName,currentNoteIndex)
                      {

                          if(currentNoteIndex<lengthOfCurrentSong)
                          {



                                    const gainNode=audioContext.createGain();   //creating Gain Node for volume control                           
                                    const oscillator=audioContext.createOscillator(); // creating an oscillator
                                    oscillator.connect(gainNode);  //connecting to gainNode
                                    gainNode.connect(audioContext.destination);//connecting to speakers
                                    volume=slider.val();
                                    gainNode.gain.value=volume/100;
                                    console.log("Current Volume is "+volume);


                                    oscillator.frequency.value=notes[scoreData[currentSongName][currentNoteIndex].note]*octaveMultiplied
                                    oscillator.start();
                                    display(scoreData[currentSongName][currentNoteIndex].note);

                                    oscillator.stop(audioContext.currentTime+scoreData[currentSongName][currentNoteIndex].duration/1000);
                                    
                                    

                                    playInterval=setTimeout(function(){
                                        playNextNote(currentSongName,currentNoteIndex+1)}
                                    ,
                                    scoreData[currentSongName][currentNoteIndex].duration);

                          }//closing if statement
                          else
                          {
                                console.log("end2");
                                        stopAutoPlay();
                          }// closing else statement

                                  
                      } // closing PlayNextNote function

             
                       playNextNote(currentSongName,currentNoteIndex);
                    }// closing songPlay
            } // closing if statement




              songPlay(currentSongName,currentNoteIndex);//関数を実行
            

    }  //closing if statement 

    else
    {
            
              console.log("end3");
              stopAutoPlay();
    }

} // closing autoPlay function
    
   /* else{  // もし再生時だったら
      return;
      isPlaying=false;

    }
*/
  










///////////////////////////////////////////////////////////////////////////////////////////////////////////


</script>

</body>
</html>
