<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Piano App</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Potta+One&display=swap');
      
      body{
        font-family:"Potta One",sans-serif;
        display:flex;
        justify-content: center;
        height: 1000px;
        /*background: #635f5f;*/
        background-image: linear-gradient(to bottom, #e46f00, #5a00a8);
      }
      .container{
        width:800px;
        height:700px;
        background-color:rgb(255, 0, 157);
        display:flex;
        flex-direction:column;
        vertical-align:center;
        justify-content:space-around;
        border-radius:10px 10px 200px 200px;
        border-bottom:20px solid rgb(143, 0, 112);
        background-image: linear-gradient(to bottom, #fc77c0,rgb(255, 0, 157));
      }
      .display{
        background-color:rgb(0, 158, 250);
        width:60%;
        height:100%;
        margin:0 auto;
        display:flex;
        justify-content: center;
        align-items: center;
        border-radius:20px;
        position:relative;
        border-top:5px solid rgb(143, 0, 100);
         background-image: linear-gradient(to bottom, #76adff, #0004ff);
      }
      .keys{
        /*background-color:pink;*/
        width:80%;
        height:40%;
        margin:0 auto;
        display:flex;
        background-color: #6b0042;
        border-radius: 5px 5px 30px 30px;
      }

      .key{
         border:1px solid black;
         width:15%;
         height:99%;
         border-radius:10px 10px 40px 40px;
         background-color:white;
         transition: all 0.1s ease-out;
         border-bottom: 10px solid #bfb8b8;
      }

      .key.glowing{
        transform: translateY(10px);
        background-color:rgb(255, 136, 0);
        transition: all 0.1s ease-out;
         border-bottom: 10px solid rgb(187, 100, 0);
         border-top: 5px solid rgb(187, 100, 0);
      }

      .letter{
        color:white;
        font-size:50px;
        font-weight:bold;
      }
      .letterInUpperDisplay{
        display:none;
        color:white;
        position:absolute;
        top:10px;
      }


      .displayContainer{
        width:100%;
        height:30%;
        display:flex;
        justify-content: center;
        position:relative;
        
      }

      .autoPlay{
        position:absolute;
        bottom:0px;
        right:0px;
        transition: all 0.1s ease-out;
        font-family:"Potta One",sans-serif;
      }
      button.autoPlayButton{
      border-bottom:6px solid rgb(172 172 172);
      transition: all 0.1s ease-out;
      font-family:"Potta One",sans-serif;
      }

      button.autoPlayButton:active{
      border-bottom:0px;
      transform: translateY(6px);

      }

      

    </style>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>
<body>
<div class="container">
  <div class="displayContainer">
      <div class="display">
        <div class="letter">
      
      </div>
      <div class="letterInUpperDisplay">Playing:</div>
      </div>
          <div class="autoPlay">
            <button class="autoPlayButton" onclick="autoPlay(null,0)">
              AutoPlay
            </button>

          </div>
  </div>
  
  <div class="keys">
    <input class="key do" onclick="display('ド');playSound('ド')"></input>
    <input class="key re" onclick="display('レ');playSound('レ')"></input>
    <input class="key mi"onclick="display('ミ');playSound('ミ')"></input>
    <input class="key fa" onclick="display('ファ');playSound('ファ')"></input>
    <input class="key so" onclick="display('ソ');playSound('ソ')"></input>
    <input class="key ra" onclick="display('ラ');playSound('ラ')"></input>
    <input class="key shi"onclick="display('シ');playSound('シ')"></input>


  </div>

</div>

///////////////////functions///////////////////////////////////////////////////////////////////////////////

function display(note)
{ 
   clearTimeout(displayInterval);

$('.letter').text(note);            // displaying note 


  displayInterval=setTimeout(function(){ // making it disappear in 1 sec
    $('.letter').text("");
  },500)

  //// for key glowing function////////////////////////////////////
  const noteToClassNameConverter= //音階 （"ド"）をクラス名へ変換するためのオブジェクト
  {
    "ド":".do",
    "レ":".re",
    "ミ":".mi",
    "ファ":".fa",
    "ソ":".so",
    "ラ":".ra",
    "シ":".shi"
  }

  $(noteToClassNameConverter[note]).addClass("glowing");
console.log("class selected is "+noteToClassNameConverter[note]);
console.log($(noteToClassNameConverter[note]).attr('class'));

setTimeout(function(){
$(noteToClassNameConverter[note]).removeClass("glowing");

},500);
//console.log("after setTimeout "+$(noteToClassNameConverter[note]).attr('class'));

function autoPlayPaused(currentSongName)
{

            isPaused=true 
            console.trace("autoPlayPaused was called from:");

              $('.key').prop('disabled',false);

                $('.autoPlayButton').text('AutoPlay');
          $('.autoPlayButton').attr('onclick',`autoPlay('${currentSongName}',0)`);

           $('.letterInUpperDisplay').css('display','none');

}







 function stopAutoPlay()
 {
              console.trace("stopAutoPlay was called from:");
              console.log("stopAutoPlay called, playInterval =", playInterval);
              clearTimeout(playInterval);
              console.log("the song has reached the end!!")
              $('.key').prop('disabled',false);
              isPlaying=false;

            $('.autoPlayButton').text('AutoPlay');
          $('.autoPlayButton').attr('onclick','autoPlay(null,0)');

           $('.letterInUpperDisplay').css('display','none');
              
              console.log("currentSongName is..."+currentSongName);

  } //closing stopAutoPlay function




function glowingKeys()
{


}






function playSound(note)
{
  
  const audioContext=new AudioContext();//set up a foundation
  const oscillator=audioContext.createOscillator(); // creating an oscillator
  oscillator.frequency.value=notes[note];// オブジェクト notes からfrequencyを引き出し、それをoscillatorのfrequencyとして代入


  oscillator.connect(audioContext.destination);//connecting to speakers
  oscillator.start();

  oscillator.stop(audioContext.currentTime+0.5)

  
} // closing PlaySound function



function autoPlay(currentSongName,currentNoteIndex)
{

  if(isPlaying==false)
  { //非再生時のみ実行
                                                     //select between two songs randomly
            isPlaying=true;  //再生状態にする
            
            console.log('starting play');

            if(currentSongName===null)
                  {
                      const mora=Object.keys(scoreData)                                                                       //random selection function
                      const randomSong=mora[Math.floor(Math.random() * mora.length)]
                      currentSongName=randomSong
                    
                  }
            console.log("Playing"+currentSongName);
            console.log("currentSongName is.."+currentSongName);
            $('.letterInUpperDisplay').text("Playing:"+currentSongName);
            $('.letterInUpperDisplay').css('display','block');
            lengthOfCurrentSong=scoreData[currentSongName].length
            console.log("lengthOfCurrentSong="+lengthOfCurrentSong);

          $('.key').prop('disabled',true);  // disabling keys

          $('.autoPlayButton').text('Stop Playing');
          $('.autoPlayButton').attr('onclick',`autoPlayPaused('${currentSongName}')`)


            console.log("currentNoteIndex"+currentNoteIndex+",lengthOfCurrentSong"+lengthOfCurrentSong);
            if(currentNoteIndex<lengthOfCurrentSong)
            {
            
              


                songPlay= function (currentSongName,currentNoteIndex)
                {  //関数を設定
                      const audioContext=new AudioContext();//set up a foundation
                    
                      
                      playNextNote=function(currentSongName,currentNoteIndex)
                      {

                          if(currentNoteIndex<lengthOfCurrentSong)
                          {
                                    const oscillator=audioContext.createOscillator(); // creating an oscillator
                                    oscillator.connect(audioContext.destination);//connecting to speakers
                                    oscillator.frequency.value=notes[scoreData[currentSongName][currentNoteIndex].note]
                                    oscillator.start();
                                    display(scoreData[currentSongName][currentNoteIndex].note);

                                    oscillator.stop(audioContext.currentTime+scoreData[currentSongName][currentNoteIndex].duration/1000);
                                    
                                    

                                    playInterval=setTimeout(function(){
                                        playNextNote(currentSongName,currentNoteIndex+1)}
                                    ,
                                    scoreData[currentSongName][currentNoteIndex].duration);

                          }//closing if statement
                          else
                          {
                                console.log("end2");
                                        stopAutoPlay();
                          }// closing else statement

                                  
                      } // closing PlayNextNote function

             
                       playNextNote(currentSongName,currentNoteIndex);
                    }// closing songPlay
            } // closing if statement




              songPlay(currentSongName,currentNoteIndex);//関数を実行
            

    }  //closing if statement 

    else
    {
            
              console.log("end3");
              stopAutoPlay();
    }

} // closing autoPlay function
