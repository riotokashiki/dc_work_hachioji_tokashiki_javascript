<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Piano App</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Potta+One&display=swap');
      
      body{
        font-family:"Potta One",sans-serif;
        display:flex;
        justify-content: center;
        height: 1000px;
        /*background: #635f5f;*/
        background-color:#e46f00;
        transition: all 1.5s ease-out;
      }
      body.lowerOctave{

        background-color: #0c0075;
        /*transition: all 2s ease-out;*/
      }

      body.higherOctave{
        background-color: #bee900;
      }
      .container{
        width:800px;
        height:700px;
        background-color:rgb(255, 0, 157);
        display:flex;
        flex-direction:column;
        vertical-align:center;
        justify-content:space-around;
        border-radius:10px 10px 200px 200px;
        border-bottom:20px solid rgb(188 0 116);
        background-image: linear-gradient(to bottom, #fc77c0,rgb(255, 0, 157));
      }
      .display{
        background-color:rgb(0, 158, 250);
        width:60%;
        height:100%;
        margin:0 auto;
        display:flex;
        justify-content: center;
        align-items: center;
        border-radius:20px;
        position:relative;
        border-top:5px solid rgb(143, 0, 100);
         background-image: linear-gradient(to bottom, #76adff, #0004ff);
      }
      .keys{
        /*background-color:pink;*/
        width:80%;
        height:40%;
        margin:0 auto;
        display:flex;
        background-color: #6b0042;
        border-radius: 5px 5px 30px 30px;
      }

      .key{
         border:1px solid black;
         width:15%;
         height:99%;
         border-radius:10px 10px 40px 40px;
         background-color:white;
         transition: all 0.1s ease-out;
         border-bottom: 10px solid #bfb8b8;
      }

      .key.glowing{
        transform: translateY(10px);
        background-color:rgb(255, 136, 0);
        transition: all 0.1s ease-out;
         border-bottom: 10px solid rgb(187, 100, 0);
         border-top: 5px solid rgb(187, 100, 0);
      }

      .letter{
        color:white;
        font-size:50px;
        font-weight:bold;
      }
      .letterInUpperDisplay{
        display:none;
        color:white;
        position:absolute;
        top:10px;
      }


      .displayContainer{
        width:100%;
        height:30%;
        display:flex;
        justify-content: center;
        position:relative;
        
      }

      .autoPlay{
        position:absolute;
        bottom:0px;
        right:0px;
        transition: all 0.1s ease-out;
        font-family:"Potta One",sans-serif;
      }
      button.autoPlayButton{
      border-bottom:6px solid rgb(172 172 172);
      transition: all 0.1s ease-out;
      font-family:"Potta One",sans-serif;
      }

      button.autoPlayButton:active{
      border-bottom:0px;
      transform: translateY(6px);

      }

      .sliderContainer{
        position:absolute;
        left:10px;
        bottom:0px;
        display:flex;
        flex-direction:column;
        justify-content: center;
        align-items: center;
      }

      input#volumeSlider {
      width: 80%;
      }
      
      div.volume{
        font-size:16px;
        font-weight:100;
      }

      .muteButton{
        width:20px;
        height:20px;

      }

      .octaveShifterContainer{
        position:absolute;
        top:0px;
        left:30px;
        display:flex;
align-items:center;
      
      }

      .octaveButtonContainer{
        display:flex;
        flex-direction:column;
        
      }
      p.octave{
        font-size:17px;
        align-items:center;
      }
      .octaveButton{
        transition: all 0.1s ease-out;
      }

      .octaveButton:active{
        filter:contrast(0);
        transition: all 0.1s ease-out;
      }

      .octaveButton:hover,
      .muteButton:hover,
      .key:hover,
      .autoPlayButton:hover,
      input#volumeSlider:hover
      {
        cursor: pointer;
      }


      .key.is-disabled {
    
        cursor: not-allowed;
      }


    </style>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>
<body>
<div class="container">
  <div class="displayContainer">
      <div class="display">
        <div class="letter">
      
      </div>
      <div class="letterInUpperDisplay">Playing:</div>
      </div>
          <div class="autoPlay">
            <button class="autoPlayButton" onclick="startAutoPlay(null,0)">
              自動演奏
            </button>
          </div>
          <div class="sliderContainer">
            <div class="volume"><span><img src="materials/images/icons8-volume-60.png" alt="" class="muteButton" onclick="muteVolume()">  </span>Volume</div>
            <input type="range" min="0" max="100" value="100" class="slider" id="volumeSlider">
              
          </div>
          <div class="octaveShifterContainer">
            <p class="octave">Octave</p>
            <div class="octaveButtonContainer">
            <img class="octaveButton up" onclick="octaveUp()" src="materials/images/icons8-up-arrow-40.png" alt="up"></img>
            <img class="octaveButton down" onclick="octaveDown()" src="materials/images/icons8-down-button-40.png" alt="down"></img>
            </div>
          </div>

  </div>
  
  <div class="keys">
    <div class="key do" onclick="if(!isPlaying){showNote('ド');playTone('ド')}"></div>
    <div class="key re" onclick="if(!isPlaying){showNote('レ');playTone('レ')}"></div>
    <div class="key mi"onclick="if(!isPlaying){showNote('ミ');playTone('ミ')}"></div>
    <div class="key fa" onclick="if(!isPlaying){showNote('ファ');playTone('ファ')}"></div>
    <div class="key so" onclick="if(!isPlaying){showNote('ソ');playTone('ソ')}"></div>
    <div class="key ra" onclick="if(!isPlaying){showNote('ラ');playTone('ラ')}"></div>
    <div class="key shi"onclick="if(!isPlaying){showNote('シ');playTone('シ')}"></div>


  </div>

</div>





<script>

let currentNoteIndex=0
let currentSong=null
let currentSongLength=0

let displayTimerId=null
let volume=50
let $volumeSlider=$('#volumeSlider')    ;      //capturing volume slider and storing it into a variable "slider". the $ indicates it is a jQuery object
let previousVolume=100

let currentOctave=4

                                {note:"ファ",duration:500},{note:"",duration:500},

                                {note:"ミ",duration:500},{note:"",duration:500},
                                {note:"レ",duration:2000},

                                {note:"ド",duration:500},{note:"",duration:500},

                                {note:"ソ",duration:500},{note:"",duration:500},
                                {note:"ソ",duration:500},{note:"",duration:500},
                                {note:"ラ",duration:500},{note:"",duration:500},

                              {note:"ソ",duration:500},{note:"ミ",duration:500},{note:"レ",duration:500},{note:"ド",duration:500},
                              {note:"レ",duration:500},{note:"ミ",duration:500},{note:"レ",duration:1000},

const NOTE_TO_CLASS = {
  ド: ".do", レ: ".re", ミ: ".mi",
  ファ: ".fa", ソ: ".so", ラ: ".ra", シ: ".shi",
};

const ERASE_MS = 1000;




///////////////////////////////////////////////////////////////////////////////////////////////////////////

///////////////////functions///////////////////////////////////////////////////////////////////////////////


function highlightOnce(note, ms = 500) {
  const sel = NOTE_TO_CLASS[note];
  if (!sel) return;
  const $el = $(sel);
  $el.addClass("glowing");
  setTimeout(() => $el.removeClass("glowing"), ms);
}






function showNote(note)
{ 
    clearTimeout(displayTimerId);
    $('.letter').text(note);            // displaying note 
    if(note){
    displayTimerId=setTimeout(function(){ // making it disappear in 1 sec
    $('.letter').text("");
  },ERASE_MS)
    }
  highlightOnce(note);
  
} //closing showNote function


function stopAutoPlay(currentSong,currentNoteIndex)
{
          console.log("stopped");
            isStopped=true 
            console.trace("stopAutoPlay was called from:");
             clearTimeout(playTimerID);
             console.log("the song has been paused!!");
             console.log("A currentNoteIndex is...."+currentNoteIndex);
              setKeyboardEnabled(true);  

              isPlaying=false;
                $('.autoPlayButton').text('自動演奏');
          $('.autoPlayButton').attr('onclick',`startAutoPlay('${currentSong}',0)
          console.log("pause disabled")`);
            console.log('<button>attribute changed to,'+'${currentSong}');
           $('.letterInUpperDisplay').css('display','none');
           console.log("currentSong is..."+currentSong);



}







 function endAutoPlay()
 {
              console.trace("endAutoPlay was called from:");
              console.log("endAutoPlay called, playTimerID =", playTimerID);
              clearTimeout(playTimerID);
              console.log("the song has reached the end!!")
              setKeyboardEnabled(true); 
              isPlaying=false;

            $('.autoPlayButton').text('AutoPlay');
          $('.autoPlayButton').attr('onclick','startAutoPlay(null,0)');

           $('.letterInUpperDisplay').css('display','none');
              
              console.log("currentSong is..."+currentSong);
              return;
  } //closing stopAutoPlay function


function muteVolume(){

if($volumeSlider.val()===0){
  isMuted=true
}
else{
  isMuted=false
  previousVolume=$('#volumeSlider').val()
  console.log("previousVolume was..."+$('#volumeSlider').val());
}
console.log("isMuted...."+isMuted);

if(!isMuted){
const audioContext=new AudioContext();//set up a foundation creating audio context
const gainNode=audioContext.createGain();   //creating Gain Node for volume control
$('#volumeSlider').val(0);
volume=0;

gainNode.gain.value=0
console.log("Current Volume is "+volume);
isMuted=true
console.log("isMuted...."+isMuted);
$('.muteButton').attr("src","materials/images/icons8-volume-60 - Copy.png");
}
else{ // isMuted is true
  $('#volumeSlider').val(previousVolume);
  console.log("restored to the previousVolume "+previousVolume);
  $('.muteButton').attr("src","materials/images/icons8-volume-60.png");
}

}

function octaveUp()
{

      if(currentOctave<6)
      {
                octaveFactor=octaveFactor*2
                currentOctave=currentOctave+1
                //$('.octaveButton').addClass('octaveButtonPressed');
                console.log("currentOctave is "+currentOctave);

                if(currentOctave>4){
                  $('body').removeClass('lowerOctave');
                  $('body').addClass('higherOctave');
                }
                if(currentOctave===4){
                $('body').removeClass('lowerOctave');
                $('body').removeClass('higherOctave');
                }
      }
      
}
function octaveDown()
{
        if(currentOctave>2)
        {
          octaveFactor=octaveFactor*0.5
          currentOctave=currentOctave-1
          //$('.octaveButton').addClass('octaveButtonPressed');
          console.log("currentOctave is "+currentOctave);

          if(currentOctave<4){
            $('body').removeClass('higherOctave');
            $('body').addClass('lowerOctave');
            
          }
          if(currentOctave===4){
          $('body').removeClass('lowerOctave');
          $('body').removeClass('higherOctave');
          }
        }
        
}







function playTone(note)
{
  
  const audioContext=new AudioContext();//set up a foundation creating audio context
  const gainNode=audioContext.createGain();   //creating Gain Node for volume control
 
  const oscillator=audioContext.createOscillator(); // creating an oscillator
  oscillator.connect(gainNode);
  oscillator.frequency.value=NOTE_FREQ[note]*octaveFactor;// オブジェクト NOTE_FREQからfrequencyを引き出し、それをoscillatorのfrequencyとして代入


  gainNode.connect(audioContext.destination);//connecting to speakers

volume=$volumeSlider.val();
gainNode.gain.value=volume/100;  // setting volume
console.log("Current Volume is "+volume);



  oscillator.start();

  oscillator.stop(audioContext.currentTime+0.5)

  
} // closing PlaySound function



function startAutoPlay(currentSong,currentNoteIndex)
{
    songPlay= function (currentSong,currentNoteIndex)
                {  //関数を設定
                      const audioContext=new AudioContext();//set up a foundation
                      
  








                    //console.log("G currentNoteIndex is..."+currentNoteIndex);


                      
                      playNextNote=function(currentSong,currentNoteIndex)
                      {
                          //console.log("H currentNoteIndex is..."+currentNoteIndex);//この時点でcurrentNoteIndexが倍増してしまう

                          if(currentNoteIndex<currentSongLength)
                          {
                                  //console.log("E currentNoteIndex is..."+currentNoteIndex);
                                  $('.autoPlayButton').text('演奏停止');
                                  $('.autoPlayButton').attr('onclick',`stopAutoPlay('${currentSong}','${currentNoteIndex}')`)

                                    const gainNode=audioContext.createGain();   //creating Gain Node for volume control                           
                                    const oscillator=audioContext.createOscillator(); // creating an oscillator
                                    oscillator.connect(gainNode);  //connecting to gainNode
                                    gainNode.connect(audioContext.destination);//connecting to speakers
                                    volume=$volumeSlider.val();
                                    gainNode.gain.value=volume/100;
                                    console.log("Current Volume is "+volume);
                                   // console.log("F currentNoteIndex is..."+currentNoteIndex);

                                    oscillator.frequency.value=NOTE_FREQ[SCORES[currentSong][currentNoteIndex].note]*octaveFactor
                                    oscillator.start();
                                    showNote(SCORES[currentSong][currentNoteIndex].note);

                                    oscillator.stop(audioContext.currentTime+SCORES[currentSong][currentNoteIndex].duration/1000);
                                    console.log("B currentNoteIndex is..."+currentNoteIndex);
                                    

                                    playTimerID=setTimeout(function(){
                                        playNextNote(currentSong,currentNoteIndex+1)}
                                    ,
                                    SCORES[currentSong][currentNoteIndex].duration);

                          }//closing if statement
                          else
                          {
                                console.log("end2");
                                        endAutoPlay();
                          }// closing else statement

                                  
                      } // closing PlayNextNote function

                      
                        playNextNote(currentSong,currentNoteIndex);
                    }// closing songPlay




  //console.log("C currentNoteIndex is...."+currentNoteIndex);

  if(!isPlaying)
  { //非再生時のみ実行
                                                     //select between two songs randomly
            isPlaying=true;  //再生状態にする
            
            console.log('starting play');

            if(currentSong===null)
                  {
                      const mora=Object.keys(SCORES)                                                                       //random selection function
                      const randomSong=mora[Math.floor(Math.random() * mora.length)]
                      currentSong=randomSong
                    
                  }
            console.log("Playing"+currentSong);
            console.log("currentSong is.."+currentSong);
            $('.letterInUpperDisplay').text("Playing:"+currentSong);
            $('.letterInUpperDisplay').css('display','block');
            currentSongLength=SCORES[currentSong].length
            console.log("currentSongLength="+currentSongLength);

            setKeyboardEnabled(false); 

         


            console.log("currentNoteIndex"+currentNoteIndex+",currentSongLength"+currentSongLength);
            if(currentNoteIndex<currentSongLength)
            {
            
             // console.log("D currentNoteIndex is...."+currentNoteIndex);


                
            } // closing if statement




              songPlay(currentSong,currentNoteIndex);//関数を実行
            

    }  //closing if statement 

    else
    {
            
              console.log("end3");
              endAutoPlay();
    }

} // closing autoPlay function
    
   /* else{  // もし再生時だったら
      return;
      isPlaying=false;

    }
*/
  


function setKeyboardEnabled(enabled) {
  var keys = document.querySelectorAll('.key');
  for (var i = 0; i < keys.length; i++) {
    var el = keys[i];
    if (enabled === true) {
      el.style.pointerEvents = 'auto';
      el.classList.remove('is-disabled');
    } else {
      el.style.pointerEvents = 'none';
      el.classList.add('is-disabled');
    }
  }
}
