<body>
    <script>

        let argument=Math.floor(Math.random()*10+1)

   function ransu(argument){
    if(argument%2==0){
        return argument*10;
    }
    else{
        return argument*100;
    }
   }


   document.write(ransu(argument));

  // console.log(Math.floor(Math.random()*10+1))

        
    </script>
