<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WORK11</title>
</head>
<body>
    <script>
    

      let randomNumbers=[];
      let textOutput="";

      for(let i =0;i<=5;i++){
        let randomNum=Math.floor(Math.random()*100+1);
        randomNumbers.push(randomNum);
        

        if(randomNum%2==0){
          textOutput+="20 ";

        }
        else{
          textOutput+="25 ";

        }


      }
        
      document.write(randomNumbers+"<br>");
      document.write(textOutput);



        
    </script> 
</body>
</html>
