function num2(){
  
  const random01 = Math.floor(Math.random() * 101);
  const random02 = Math.floor(Math.random() * 101);
  let outputText=`random01=${random01},random02=${random02}です。`

  if(random01>random02){
    outputText +="random01の方が大きいです。"

     multipleOf3 ++
