<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>課題</title>
</head>
<body>
    <div id="textbox">
        <p id="element_1">要素1</p>
    </div>
    <script> 
       document.getElementById(element_1);
       element_1.textContent="変更後テキスト";

       document.getElementById(textbox);
       textbox.style.backgroundColor="#ffff00";
        let addedText=document.createElement('p');
        addedText.textContent="追加テキスト";
       element_1.appendChild(addedText);
       addedText.style.color="#ff0000";
       addedText.style.fontSize='30px';
    </script>
</body>
</html>
