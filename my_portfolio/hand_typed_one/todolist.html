<!DOCTYPE  html>
<html lang="ja">
    <head>
    <meta charset="UTF-8">
    <title>to do list</title>
    <style>
      body,html{
        display: flex;
        justify-content: center;
        align-items:center;
        width:100%;
        height:100%;
      }

      .wholeContainer{
        border:1px solid black;
        border-radius:15px;
        width:500px;
        height:250px;
        display:flex;
        justify-content: center;
        flex-direction: column;
      }
      .addButton{
        border:1px solid black;
        background: green;
      }
      .inputContainer{
        display: flex;
        justify-content: center;
      }
      ul{
        border-radius:15px;
        border:1px solid black;
      }
      .list{
        color:black;
      }
      .span{
        color:black;
      }
      .deleteButton{
        color:white;
        background:red;
        border-radius:10px;
        height:35px;
        width:50px;
        font-size:15px;
        text-align: center;
        padding-right: 8px;
        padding-left: 2.5px;
      }

      li{
        list-style-type:none;
        display: flex;
        justify-content: space-between;
        padding: 5px 20px;
      }

      ul{
            padding-left: 0;
      }

      .checked{
        text-decoration: line-through;
      }
    </style>
    </head>
    <body>

      <div class="wholeContainer">
        <div class="inputContainer">
        <input type="text" id="inputField">
        <button class="addButton" id="addButton">+</button>
          </div>
        <ul class="taskList">








        </ul>






      </div>





  <script src="todolist.js"></script><!--Where to put JS sheet is before the closing body tag.   -->
    </body>
</html>
