<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Image Upload</title>
    
    <style>
      
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    background-color: white;
    font-family: Arial, sans-serif;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    border: 2px solid #ccc;
    margin-bottom: 30px;
    border-radius: 10px;
    background-color: #f9f9f9;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    width:100px;
    height:100px;
    border-radius:10px;
}

#fileUpload {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    cursor: pointer;
}

#output{
width:400px;
max-width:500px;
}

label{
    background:rgb(105, 105, 105);
    font-weight:800px;
    width:100%;
    height:100%;
    color:white;
    border-radius:10px;
    text-align:center;
}

    </style>
</head>
<body>
    <div class="container">
        <input type="file" id="fileUpload" accept="image/*" hidden>
        <label for="fileUpload">+</label>
    </div>
  <div class="image-container">
    <img id="output" src="" alt="">
  </div>
  <script>
const fileInput = document.getElementById("fileUpload")//Fetching the file upload button
const imageOutput = document.getElementById("output");//Fetching the output image

fileInput.addEventListener("change", async () => {
    let [file] = fileInput.files

    const reader = new FileReader();
    reader.onload = (e) => {
    imageOutput.src = e.target.result;
    };

    reader.onerror = (err) => {
        console.error("Error reading file:", err);
        alert("An error occurred while reading the file.");
    };


    reader.readAsDataURL(file);
})


</script>
</body>

</html>
