<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Work26 stop watch</title>
    <style>
      body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
      }
      .container{
        background-color:#08FF32;
        height :300px;
        width:550px;
        border-radius:16px;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        
      }
      .displayScreen{
        height:40%;
        width:70%;
        background-color:black;
        border-radius:16px;
         display:flex;
        justify-content:center;
        align-items:center;
        

      }



      .numbers{
        color:white;
        /*height:60%;
        width:60%;*/
        text-align: center;
        font-size:60px;
      }

      .buttonContainer{
        height:20%;
        width:70%;
        display:flex;
        justify-content:center;
        align-items:center;
      }

      input{
        border-radius:14px;
        background-color: black;
        color: white;
        height:70%;
        width:33%;
      }

      input[type="button"]:disabled{
        opacity:0.3;
      }
      

    </style>
    <script src="jquery-3.7.1.min.js"></script>

</head>
<body>
    <div class="container">
      <div class="displayScreen">
        <p class="numbers" id="numbers">
          <span id="minutes">00</span>:<span id="seconds">00</span>.<span id="milliSeconds">00</span>

        </p>

      </div>
      <div class="buttonContainer">
        <input type="button" id="start" value="Start">
        <input type="button" id="stop" value="Stop" disabled>
        <input type="button" id="reset" value="Reset" disabled>


      </div>

    </div>
    







    <script>

      //Grobal Variables
        let milliSecond=0
          let secondCount=0  //秒針   初期化
           let minuteCount=0  //分針  初期化
           //let hourCount=0     //時針 初期化

          let milliSecondValue=$('#milliSeconds')
          let secondValue=$('#seconds')  //秒針要素の取得を 変数へ格納
          let minuteValue=$('#minutes')   //分針要素の取得を 変数へ格納
          //let hourValue=document.getElementById("hours")       //時針要素の取得を 変数へ格納
          let elapsedTime=0
          let startTime=0
          let resumePoint=null
          let savedTime=null

        function startStopWatch(){
        console.log("START clicked - creating new startTime");//デバッグの為表記
          

           $('#start').prop('disabled',true);
           $('#stop').prop('disabled',false);
           $('#reset').prop('disabled',true);
          

           if(elapsedTime===0){
           startTime=Date.now() //開始時間のepoch timeを取得 startTimeへ格納
           console.log("startTime:", startTime);
           }
           else{
            resumePoint=Date.now()
           }
          
           

          function countUp(){ 
            
            let currentTime=Date.now() //epoch timeを取得し currentTimeへ格納

            if(savedTime!==null){
            elapsedTime=currentTime-resumePoint+savedTime //経過時間をcurrentTimeからstartTimeを引いたものとする
            console.log("elapsedTime:", elapsedTime); //デバッグの為表記
            }
            else{
              elapsedTime=currentTime-startTime //経過時間をcurrentTimeからstartTimeを引いたものとする
            console.log("elapsedTime:", elapsedTime); //デバッグの為表記
            }


            let totalMilliSeconds=Math.floor(elapsedTime/10)
            let totalSeconds=Math.floor(elapsedTime/1000)
            let totalMinutes=Math.floor(elapsedTime/60000)
            //let totalHours=Math.floor(elapsedTime/3600000)

            let displayMilliSeconds=String(totalMilliSeconds%100).padStart(2,0)
            let displaySeconds=String(totalSeconds%60).padStart(2,0)
            let displayMinutes=String(totalMinutes%60).padStart(2,0)
            //let displayHours=totalHours

            //hourValue.textContent=displayHours;
            minuteValue.text(displayMinutes);
            secondValue.text(displaySeconds);
            milliSecondValue.text(displayMilliSeconds);
            
          
          }
          
          intervalID =setInterval(countUp,10); //setIntervalの戻り値を変数に格納,と同時にsetInterval機能を実行
          
        };
        


        function stopStopWatch(){
          clearInterval(intervalID);
          $('#start').prop('disabled',false);
          $('#reset').prop('disabled',false);
          $('#stop').prop('disabled',true);
          console.log("STOP clicked - timer paused");  //デバッグの為表記
          console.log("elapsedTime:", elapsedTime);   //デバッグの為表記
           
          savedTime=elapsedTime
          console.log("savedTime",savedTime)
        }

        function resetStopWatch(){
          milliSecond=0;
          secondCount=0;
          minuteCount=0;
          hourCount=0;
          startTime=null
          savedTime=null
          elapsedTime=0

          milliSecondValue.text("00");
          secondValue.text("00");
          minuteValue.text("00");
          //hourValue.textContent="00";
        
          $('#reset').prop('disabled',true);
          console.log("elapsedTime:", elapsedTime);  //デバッグの為表記

        }




        $('#start').click(startStopWatch); //クリック時に 関数 startStopWatchを実行

        let intervalID =null

        $('#stop').click(stopStopWatch); //クリック時に 関数 stopStopWatch を実行

        $('#reset').click(resetStopWatch);//クリック時に関数 resetStopWatch を実行




    </script>
</body>
</html>
